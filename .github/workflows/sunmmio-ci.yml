name: SUNMMIO CI
on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PYTHONDEVMODE: "1"
  PYTHONUNBUFFERED: "1"
  PYTHONPATH: ""
  PIP_USER: ""
  COLUMNS: "100"
  FORCE_COLOR: "1"
  CLICOLOR_FORCE: "1"
  UV_INDEX_STRATEGY: "unsafe-best-match"
  UV_HTTP_TIMEOUT: "600"

jobs:
  lint:
    name: Quick Lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive
          set-safe-directory: true

      - name: Setup Python 3.9
        id: setup-pylowest
        uses: actions/setup-python@v6
        with:
          python-version: "3.9"
          update-environment: true
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements*.txt
            .pre-commit-config.yaml

      - name: Check AST with Python 3.9
        run: |
          "${{ steps.setup-pylowest.outputs.python-path }}" -m compileall -q -f tilelang

      - name: Pre-commit Lint
        run: |
          if ! pipx run pre-commit run --all-files --color=always --show-diff-on-failure; then
            echo "::error::Pre-commit checks failed. Please run 'pre-commit install' and 'pre-commit run --all-files' locally to see the issues."
            exit 1
          fi

  test:
    name: CUDA Tests in Container (NVIDIA 3090)
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    needs: [lint]
    runs-on: [self-hosted, Linux, CUDA-rtx3080]
    timeout-minutes: 120
    container:
      image: nvidia/cuda:12.8.0-devel-ubuntu24.04
      options: --gpus all --ipc=host --cap-add NET_ADMIN --sysctl net.ipv4.tcp_mtu_probing=2
      volumes:
        - /opt/ci-cache/sunmmio:/ci-cache
    env:
      USE_CUDA: 1
      PIP_EXTRA_INDEX_URL: https://download.pytorch.org/whl/cu128
      UV_INDEX: https://download.pytorch.org/whl/cu128
      CLANG_TIDY_CMAKE_OPTIONS: "-DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DUSE_CUDA=ON -DTILELANG_UPDATE_SUBMODULES=OFF -DPython3_EXECUTABLE=.venv/bin/python -DPython_EXECUTABLE=.venv/bin/python"
      CMAKE_ARGS: "-DTILELANG_UPDATE_SUBMODULES=OFF"
      XDG_CACHE_HOME: /ci-cache
      PIP_CACHE_DIR: /ci-cache/pip
      UV_CACHE_DIR: /ci-cache/uv
      PRE_COMMIT_HOME: /ci-cache/pre-commit
      GTEST_CACHE_DIR: /ci-cache/googletest
    defaults:
      run:
        shell: bash
    steps:
      - name: Prepare persistent cache
        run: |
          mkdir -p "${PIP_CACHE_DIR}" "${UV_CACHE_DIR}" "${PRE_COMMIT_HOME}"
          echo "Cache mount: /ci-cache"
          du -sh /ci-cache/* 2>/dev/null || echo "Cache is empty (first run)"

      - name: Install system dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            python3.12 python3.12-venv python3.12-dev python3-pip wget \
            clang-tidy cmake ninja-build git curl ca-certificates \
            build-essential pkg-config libprotobuf-dev \
            protobuf-compiler libgflags-dev libsqlite3-dev llvm-dev \
            iproute2 iptables curl dnsutils
          ln -sf /usr/bin/python3.12 /usr/local/bin/python

      - name: Fix container networking
        run: |
          set -euo pipefail
          echo "=== Pre-fix diagnostics ==="
          echo "DNS:"
          cat /etc/resolv.conf
          echo "Routes:"
          ip route
          echo "Interfaces:"
          ip -d link show

          # Detect default interface
          IFACE=$(ip route | awk '/default/{print $5; exit}')
          CURRENT_MTU=$(cat /sys/class/net/${IFACE}/mtu)
          echo "Default interface: ${IFACE}, current MTU: ${CURRENT_MTU}"

          # Clamp MTU to 1400 to avoid PMTUD black holes caused by
          # router proxy/VPN/PPPoE encapsulation overhead
          MTU=1400
          echo "Setting ${IFACE} MTU to ${MTU}"
          ip link set "${IFACE}" mtu "${MTU}" || \
            echo "::warning::Failed to set MTU (may need --cap-add NET_ADMIN)"

          # tcp_mtu_probing=2 is already set via --sysctl in container options
          # (/proc/sys is read-only inside the container)

          # Clamp TCP MSS to path MTU for all outgoing SYN packets
          iptables -A OUTPUT -p tcp --tcp-flags SYN,RST SYN -j TCPMSS --clamp-mss-to-pmtu 2>/dev/null || \
            echo "::warning::iptables MSS clamping failed (may need NET_ADMIN capability)"

          # Verify connectivity to critical hosts
          echo "=== Post-fix connectivity test ==="
          for host in github.com pypi.org download.pytorch.org; do
            curl -sS --connect-timeout 15 --max-time 30 "https://${host}" > /dev/null \
              && echo "${host}: OK" \
              || echo "::warning::${host}: FAILED"
          done

      - name: Install GoogleTest from source
        run: |
          cd "${GTEST_CACHE_DIR}"
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local
          cmake --build build -j$(nproc)
          cmake --install build
          cd ..

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive
          set-safe-directory: true

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Setup Python environment
        run: |
          uv venv .venv --python /usr/bin/python3.12
          uv pip install --python .venv/bin/python -v --upgrade pip setuptools wheel
          uv pip install --python .venv/bin/python -v -r requirements-test.txt
          echo "import torch; print(f'torch: {torch.__version__}')" | uv run --no-project --script -
          uv pip install --python .venv/bin/python --no-build-isolation-package=flash-attn -v -r requirements-test-cuda.txt
          . .venv/bin/activate
          python -c "import torch; print(f'torch: {torch.__version__}'); print(f'cuda available: {torch.cuda.is_available()}'); print(f'device: {torch.cuda.get_device_name(0)}')"
          echo "::group::torch.utils.collect_env"
          uv run --no-project -m -- torch.utils.collect_env
          echo "::endgroup::"

      - name: Run clang-tidy
        id: clang-tidy
        run: |
          echo "\$ $(command -v clang-tidy) --version" && clang-tidy --version

          # Download run-clang-tidy script
          RCT_URL=https://raw.githubusercontent.com/llvm/llvm-project/refs/heads/release/21.x/clang-tools-extra/clang-tidy/tool/run-clang-tidy.py
          echo "Downloading run-clang-tidy script from ${RCT_URL}"
          echo "import urllib.request; url = '${RCT_URL}'.rstrip('/'); urllib.request.urlretrieve(url, url.split('/')[-1])" | uv run --no-project --script -
          CLANG_TIDY=(uv run --no-project --script -- run-clang-tidy.py)
          if [[ -x "$(command -v clang-apply-replacements)" ]]; then
            echo "Using clang-apply-replacements from $(command -v clang-apply-replacements)"
            CLANG_TIDY+=(-fix -clang-apply-replacements-binary="$(command -v clang-apply-replacements)")
          else
            echo "::warning::clang-apply-replacements not found in PATH, automatic fixing disabled."
          fi

          # Activate venv so CMake finds z3 and other Python packages
          . .venv/bin/activate

          # Run cmake to create the build directory with compile_commands.json
          cmake -S . -B cmake-build --fresh ${CLANG_TIDY_CMAKE_OPTIONS}  # no quotes here

          CXX_FILES=$(find src -type f -iname "*.[ch]pp" -o -iname "*.cc" -o -iname "*.c" -o -iname "*.h")
          rc=0
          "${CLANG_TIDY[@]}" -clang-tidy-binary="$(command -v clang-tidy)" \
            -exclude-header-filter='^(3rdparty|tvm)/.*$' \
            -p="cmake-build" ${CXX_FILES} || rc="$?"
          rm -rf cmake-build run-clang-tidy.py
          if (( rc != 0 )); then
            echo "::error::clang-tidy found issues (exit code: ${rc}). Please run 'clang-tidy --fix' locally to fix them."
            git config --global --add safe.directory "$GITHUB_WORKSPACE"
            git diff --color=always || true
            exit "${rc}"
          fi

      - name: Install project (wheel form)
        run: |
          uv pip install -v .

      - name: Run Python test suite
        run: |
          . .venv/bin/activate
          # Add the CUDA-aware pytest-xdist scheduler plugin to PYTHONPATH
          export PYTHONPATH="${GITHUB_WORKSPACE}/maint/scripts:${PYTHONPATH}"
          cd testing
          PYTEST=(
            uv run --no-project -m --
            pytest --verbose --color=yes --durations=0 --showlocals --cache-clear
          )
          "${PYTEST[@]}" -c pytest.ini ./python

      - name: List generated files
        if: ${{ !cancelled() }}
        run: |
          find . -type f -name '*.py[co]' -delete
          find . -depth -type d -name "__pycache__" -exec rm -r "{}" +
          if git status --ignored --porcelain | grep -qvE '/$'; then
            ls -alh $(git status --ignored --porcelain | grep -vE '/$' | grep -oE '\S+$')
          fi

      - name: Prune caches (disk space management)
        if: always()
        run: |
          echo "=== Cache usage before pruning ==="
          du -sh /ci-cache/* 2>/dev/null || true
          # Remove uv cache entries not used in the last 7 days
          uv cache prune --ci 2>/dev/null || true
          echo "=== Cache usage after pruning ==="
          du -sh /ci-cache/* 2>/dev/null || true
