name: SUNMMIO CI
on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PYTHONDEVMODE: "1"
  PYTHONUNBUFFERED: "1"
  PYTHONPATH: ""
  PIP_USER: ""
  COLUMNS: "100"
  FORCE_COLOR: "1"
  CLICOLOR_FORCE: "1"
  UV_INDEX_STRATEGY: "unsafe-best-match"
  UV_HTTP_TIMEOUT: "600"

jobs:
  lint:
    name: Quick Lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          set-safe-directory: true

      - name: Setup Python 3.9
        id: setup-pylowest
        uses: actions/setup-python@v6
        with:
          python-version: "3.9"
          update-environment: true
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements*.txt
            .pre-commit-config.yaml

      - name: Check AST with Python 3.9
        run: |
          "${{ steps.setup-pylowest.outputs.python-path }}" -m compileall -q -f tilelang

      - name: Pre-commit Lint
        run: |
          if ! pipx run pre-commit run --all-files --color=always --show-diff-on-failure; then
            echo "::error::Pre-commit checks failed. Please run 'pre-commit install' and 'pre-commit run --all-files' locally to see the issues."
            exit 1
          fi

  test:
    name: CUDA Tests in Container (NVIDIA 3090)
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    needs: [lint]
    runs-on: [self-hosted, Linux, CUDA-rtx3080]
    timeout-minutes: 120
    container:
      image: nvidia/cuda:12.8.0-devel-ubuntu24.04
      options: --gpus all --ipc=host --cap-add NET_ADMIN --sysctl net.ipv4.tcp_mtu_probing=2
      volumes:
        - /opt/ci-cache/sunmmio:/ci-cache
    env:
      USE_CUDA: 1
      PIP_EXTRA_INDEX_URL: https://download.pytorch.org/whl/cu128
      UV_INDEX: https://download.pytorch.org/whl/cu128
      CLANG_TIDY_CMAKE_OPTIONS: "-DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DUSE_CUDA=ON -DUSE_Z3=OFF -DTILELANG_UPDATE_SUBMODULES=OFF -DPython3_EXECUTABLE=/usr/bin/python3.12 -DPython_EXECUTABLE=/usr/bin/python3.12"
      CMAKE_ARGS: "-DTILELANG_UPDATE_SUBMODULES=OFF"
      XDG_CACHE_HOME: /ci-cache
      PIP_CACHE_DIR: /ci-cache/pip
      UV_CACHE_DIR: /ci-cache/uv
      PRE_COMMIT_HOME: /ci-cache/pre-commit
      GTEST_CACHE_DIR: /ci-cache/googletest
      NPUIR_CACHE_ROOT: /ci-cache/npuir
    defaults:
      run:
        shell: bash
    steps:
      - name: Prepare persistent cache
        run: |
          mkdir -p "${PIP_CACHE_DIR}" "${UV_CACHE_DIR}" "${PRE_COMMIT_HOME}" "${GTEST_CACHE_DIR}" "${NPUIR_CACHE_ROOT}"
          echo "Cache mount: /ci-cache"
          du -sh /ci-cache/* 2>/dev/null || echo "Cache is empty (first run)"

      - name: Install system dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            python3.12 python3.12-venv python3.12-dev python3-pip wget \
            clang-tidy cmake ninja-build git curl ca-certificates \
            build-essential pkg-config libprotobuf-dev \
            protobuf-compiler libgflags-dev libsqlite3-dev llvm-dev \
            iproute2 iptables curl dnsutils openssh-client
          ln -sf /usr/bin/python3.12 /usr/local/bin/python

      - name: Fix container networking
        run: |
          set -euo pipefail
          echo "=== Pre-fix diagnostics ==="
          echo "DNS:"
          cat /etc/resolv.conf
          echo "Routes:"
          ip route
          echo "Interfaces:"
          ip -d link show

          # Detect default interface
          IFACE=$(ip route | awk '/default/{print $5; exit}')
          CURRENT_MTU=$(cat /sys/class/net/${IFACE}/mtu)
          echo "Default interface: ${IFACE}, current MTU: ${CURRENT_MTU}"

          # Clamp MTU to 1400 to avoid PMTUD black holes caused by
          # router proxy/VPN/PPPoE encapsulation overhead
          MTU=1400
          echo "Setting ${IFACE} MTU to ${MTU}"
          ip link set "${IFACE}" mtu "${MTU}" || \
            echo "::warning::Failed to set MTU (may need --cap-add NET_ADMIN)"

          # tcp_mtu_probing=2 is already set via --sysctl in container options
          # (/proc/sys is read-only inside the container)

          # Clamp TCP MSS to path MTU for all outgoing SYN packets
          iptables -A OUTPUT -p tcp --tcp-flags SYN,RST SYN -j TCPMSS --clamp-mss-to-pmtu 2>/dev/null || \
            echo "::warning::iptables MSS clamping failed (may need NET_ADMIN capability)"

          # Verify connectivity to critical hosts
          echo "=== Post-fix connectivity test ==="
          for host in github.com pypi.org download.pytorch.org; do
            curl -sS --connect-timeout 15 --max-time 30 "https://${host}" > /dev/null \
              && echo "${host}: OK" \
              || echo "::warning::${host}: FAILED"
          done

      - name: Install GoogleTest from source
        run: |
          cd "${GTEST_CACHE_DIR}"
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local
          cmake --build build -j$(nproc)
          cmake --install build
          cd ..

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          set-safe-directory: true

      - name: Determine NPU-IR access mode
        id: npuir-mode
        env:
          HAS_PRIVATE_NPUIR_ACCESS: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        run: |
          set -euo pipefail
          if [[ "${HAS_PRIVATE_NPUIR_ACCESS}" == "true" ]]; then
            echo "available=1" >> "${GITHUB_OUTPUT}"
            echo "TILELANG_NPUIR_CMAKE_ARGS=" >> "${GITHUB_ENV}"
            echo "Running full CI with private NPU-IR access."
          else
            echo "available=0" >> "${GITHUB_OUTPUT}"
            echo "TILELANG_NPUIR_CMAKE_ARGS=-DUSE_NPUIR=OFF" >> "${GITHUB_ENV}"
            echo "Running fork-safe CI without private NPU-IR checkout."
          fi

      - name: Checkout public submodules
        run: |
          set -euo pipefail
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"
          git submodule sync --recursive
          git -c protocol.version=2 submodule update --init --force --recursive \
            3rdparty/composable_kernel \
            3rdparty/cutlass \
            3rdparty/tvm

      - name: Resolve pinned NPU-IR commit
        if: steps.npuir-mode.outputs.available == '1'
        id: npuir-ref
        run: |
          set -euo pipefail
          NPUIR_SHA="$(git ls-tree HEAD 3rdparty/NPU-IR | awk '{print $3}')"
          if [[ -z "${NPUIR_SHA}" ]]; then
            echo "::error::Could not determine the pinned NPU-IR commit from the superproject gitlink."
            exit 1
          fi
          echo "sha=${NPUIR_SHA}" >> "${GITHUB_OUTPUT}"
          echo "Pinned NPU-IR commit: ${NPUIR_SHA}"

      - name: Checkout private NPU-IR submodule
        if: steps.npuir-mode.outputs.available == '1'
        uses: actions/checkout@v6
        with:
          repository: SUNMMIO/NPU-IR
          ref: ${{ steps.npuir-ref.outputs.sha }}
          path: 3rdparty/NPU-IR
          ssh-key: ${{ secrets.SUNMMIONPUIR }}
          fetch-depth: 1

      - name: Report submodule state
        run: |
          git submodule status --recursive

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Install clang-tidy toolchain
        run: |
          # Keep clang-tidy aligned with requirements-lint.txt instead of the base image.
          uv venv .clang-tidy-venv --python /usr/bin/python3.12
          uv pip install --python .clang-tidy-venv/bin/python -v -r requirements-lint.txt

      - name: Read LLVM pin from NPU-IR
        if: steps.npuir-mode.outputs.available == '1'
        run: |
          set -euo pipefail

          llvm_config="3rdparty/NPU-IR/cmake/IncludeLLVM.cmake"
          if [[ ! -f "${llvm_config}" ]]; then
            echo "::error::Missing ${llvm_config}"
            exit 1
          fi

          NPUIR_LLVM_COMMIT="$(
            grep -E '^[[:space:]]*set\(LLVM_BUILD_COMMIT_HASH[[:space:]]+' "${llvm_config}" \
              | grep -Eo '[0-9a-f]{40}' \
              | head -n1
          )"

          if [[ -z "${NPUIR_LLVM_COMMIT}" ]]; then
            echo "::error::Could not determine the pinned LLVM commit from ${llvm_config}"
            exit 1
          fi

          echo "NPUIR_LLVM_COMMIT=${NPUIR_LLVM_COMMIT}" >> "${GITHUB_ENV}"
          echo "Using NPU-IR LLVM pin ${NPUIR_LLVM_COMMIT}"

      - name: Prepare cached LLVM checkout for NPU-IR
        if: steps.npuir-mode.outputs.available == '1'
        run: |
          set -euo pipefail

          NPUIR_CACHE_DIR="${NPUIR_CACHE_ROOT}/${NPUIR_LLVM_COMMIT}"
          NPUIR_LLVM_SOURCE_DIR="${NPUIR_CACHE_DIR}/llvm-project"
          NPUIR_LLVM_BUILD_DIR="${NPUIR_CACHE_DIR}/llvm-project-build"
          NPUIR_LLVM_MARKER_FILE="${NPUIR_CACHE_DIR}/llvm-project.commit"

          echo "NPUIR_CACHE_DIR=${NPUIR_CACHE_DIR}" >> "${GITHUB_ENV}"
          echo "NPUIR_LLVM_SOURCE_DIR=${NPUIR_LLVM_SOURCE_DIR}" >> "${GITHUB_ENV}"
          echo "NPUIR_LLVM_BUILD_DIR=${NPUIR_LLVM_BUILD_DIR}" >> "${GITHUB_ENV}"
          echo "TILELANG_NPUIR_CMAKE_ARGS=-DTILELANG_NPUIR_BINARY_DIR=${NPUIR_CACHE_DIR}" >> "${GITHUB_ENV}"

          lock_file="${NPUIR_CACHE_ROOT}/llvm-project.lock"
          exec 9>"${lock_file}"
          flock 9

          if [[ -f "${NPUIR_LLVM_MARKER_FILE}" ]] && [[ -f "${NPUIR_LLVM_SOURCE_DIR}/llvm/CMakeLists.txt" ]]; then
            current_rev="$(<"${NPUIR_LLVM_MARKER_FILE}")"
          else
            current_rev=""
          fi

          if [[ "${current_rev}" == "${NPUIR_LLVM_COMMIT}" ]]; then
            echo "Reusing cached llvm-project checkout at ${current_rev}"
          else
            archive_url="https://codeload.github.com/llvm/llvm-project/tar.gz/${NPUIR_LLVM_COMMIT}"
            archive_file="${NPUIR_CACHE_DIR}/llvm-project-${NPUIR_LLVM_COMMIT}.tar.gz"
            extract_root="${NPUIR_CACHE_DIR}/llvm-project-extract.tmp"
            source_tmp="${NPUIR_CACHE_DIR}/llvm-project.tmp"

            rm -rf "${extract_root}" "${source_tmp}"
            mkdir -p "${NPUIR_CACHE_DIR}" "${extract_root}"

            wget \
              --tries=5 \
              --waitretry=10 \
              --retry-connrefused \
              --timeout=60 \
              --output-document="${archive_file}" \
              "${archive_url}"

            tar -xzf "${archive_file}" -C "${extract_root}"
            extracted_dir="$(find "${extract_root}" -mindepth 1 -maxdepth 1 -type d | head -n1)"
            if [[ -z "${extracted_dir}" ]] || [[ ! -f "${extracted_dir}/llvm/CMakeLists.txt" ]]; then
              echo "::error::Extracted llvm-project archive is missing llvm/CMakeLists.txt"
              exit 1
            fi

            mv "${extracted_dir}" "${source_tmp}"
            rm -rf "${NPUIR_LLVM_SOURCE_DIR}" "${NPUIR_LLVM_BUILD_DIR}"
            mv "${source_tmp}" "${NPUIR_LLVM_SOURCE_DIR}"
            printf '%s\n' "${NPUIR_LLVM_COMMIT}" > "${NPUIR_LLVM_SOURCE_DIR}/.tilelang-source-commit"
            printf '%s\n' "${NPUIR_LLVM_COMMIT}" > "${NPUIR_LLVM_MARKER_FILE}"
            rm -f "${archive_file}"
            rm -rf "${extract_root}"
          fi

          du -sh "${NPUIR_CACHE_DIR}" 2>/dev/null || true

      - name: Run clang-tidy
        id: clang-tidy
        run: |
          CLANG_TIDY_PYTHON=".clang-tidy-venv/bin/python"
          CLANG_TIDY_BIN=".clang-tidy-venv/bin/clang-tidy"
          CLANG_APPLY_REPLACEMENTS_BIN=".clang-tidy-venv/bin/clang-apply-replacements"
          echo "\$ ${CLANG_TIDY_BIN} --version" && "${CLANG_TIDY_BIN}" --version
          echo "Using NPU-IR CMake args: ${TILELANG_NPUIR_CMAKE_ARGS}"

          # Run clang-tidy before provisioning the heavyweight Python/CUDA test env.
          # The clang-tidy configure only needs system Python and CUDA headers.
          RCT_URL=https://raw.githubusercontent.com/llvm/llvm-project/refs/heads/release/21.x/clang-tools-extra/clang-tidy/tool/run-clang-tidy.py
          echo "Downloading run-clang-tidy script from ${RCT_URL}"
          curl -LsSf "${RCT_URL}" -o run-clang-tidy.py
          CLANG_TIDY=("${CLANG_TIDY_PYTHON}" run-clang-tidy.py -j "$(nproc)")
          if [[ -x "${CLANG_APPLY_REPLACEMENTS_BIN}" ]]; then
            echo "Using clang-apply-replacements from ${CLANG_APPLY_REPLACEMENTS_BIN}"
            CLANG_TIDY+=(-fix -clang-apply-replacements-binary="${CLANG_APPLY_REPLACEMENTS_BIN}")
          else
            echo "::warning::clang-apply-replacements not found in PATH, automatic fixing disabled."
          fi

          # Reuse the persistent NPU-IR/LLVM cache when available; otherwise
          # configure clang-tidy with NPU-IR disabled for fork-safe CI.
          lock_file="${NPUIR_CACHE_ROOT}/llvm-project.lock"
          exec 9>"${lock_file}"
          flock 9
          cmake -S . -B cmake-build --fresh ${CLANG_TIDY_CMAKE_OPTIONS} ${TILELANG_NPUIR_CMAKE_ARGS}
          flock -u 9

          CXX_FILES=$(find src -type f \( -iname "*.[ch]pp" -o -iname "*.cc" -o -iname "*.c" -o -iname "*.h" \))
          rc=0
          "${CLANG_TIDY[@]}" -clang-tidy-binary="${CLANG_TIDY_BIN}" \
            -exclude-header-filter='^(3rdparty|tvm)/.*$' \
            -p="cmake-build" ${CXX_FILES} || rc="$?"
          rm -rf cmake-build run-clang-tidy.py
          if (( rc != 0 )); then
            echo "::error::clang-tidy found issues (exit code: ${rc}). Please run 'clang-tidy --fix' locally to fix them."
            git config --global --add safe.directory "$GITHUB_WORKSPACE"
            git diff --color=always || true
            exit "${rc}"
          fi

      - name: Setup Python environment
        run: |
          uv venv .venv --python /usr/bin/python3.12
          uv pip install --python .venv/bin/python -v --upgrade pip setuptools wheel
          uv pip install --python .venv/bin/python -v -r requirements-test.txt
          echo "import torch; print(f'torch: {torch.__version__}')" | uv run --no-project --script -
          uv pip install --python .venv/bin/python --no-build-isolation-package=flash-attn -v -r requirements-test-cuda.txt
          . .venv/bin/activate
          python -c "import torch; print(f'torch: {torch.__version__}'); print(f'cuda available: {torch.cuda.is_available()}'); print(f'device: {torch.cuda.get_device_name(0)}')"
          echo "::group::torch.utils.collect_env"
          uv run --no-project -m -- torch.utils.collect_env
          echo "::endgroup::"

      - name: Install project (wheel form)
        run: |
          # Match the wheel build mode to the checkout mode:
          # use the cached NPU-IR tree when available, otherwise disable NPU-IR.
          export CMAKE_ARGS="${CMAKE_ARGS} ${TILELANG_NPUIR_CMAKE_ARGS}"
          uv pip install -v .

      - name: Run Python test suite
        run: |
          . .venv/bin/activate
          # Add the CUDA-aware pytest-xdist scheduler plugin to PYTHONPATH
          export PYTHONPATH="${GITHUB_WORKSPACE}/maint/scripts:${PYTHONPATH}"
          cd testing
          PYTEST=(
            uv run --no-project -m --
            pytest --verbose --color=yes --durations=0 --showlocals --cache-clear
          )
          "${PYTEST[@]}" -c pytest.ini ./python

      - name: List generated files
        if: ${{ !cancelled() }}
        run: |
          find . -type f -name '*.py[co]' -delete
          find . -depth -type d -name "__pycache__" -exec rm -r "{}" +
          if git status --ignored --porcelain | grep -qvE '/$'; then
            ls -alh $(git status --ignored --porcelain | grep -vE '/$' | grep -oE '\S+$')
          fi

      - name: Prune caches (disk space management)
        if: always()
        run: |
          echo "=== Cache usage before pruning ==="
          du -sh /ci-cache/* 2>/dev/null || true
          # Keep warm prebuilt wheels on this persistent self-hosted runner.
          uv cache prune 2>/dev/null || true
          echo "=== Cache usage after pruning ==="
          du -sh /ci-cache/* 2>/dev/null || true