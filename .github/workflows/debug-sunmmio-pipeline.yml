name: Debug SunMMIO Pipeline

on:
  workflow_dispatch:
    inputs:
      case:
        description: "Pipeline test case id"
        required: true
        default: "matmul"
        type: choice
        options:
          - matmul
          - flashattn
          - flashdecoding

permissions:
  contents: read

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: false

env:
  PYTHONDEVMODE: "1"
  PYTHONUNBUFFERED: "1"
  PYTHONPATH: ""
  PIP_USER: ""
  COLUMNS: "100"
  FORCE_COLOR: "1"
  CLICOLOR_FORCE: "1"
  UV_INDEX_STRATEGY: "unsafe-best-match"
  UV_HTTP_TIMEOUT: "600"

jobs:
  debug-pipeline:
    name: Debug ${{ inputs.case }}
    runs-on: [self-hosted, Linux, CUDA-rtx3080]
    timeout-minutes: 120
    container:
      image: nvidia/cuda:12.8.0-devel-ubuntu24.04
      options: --gpus all --ipc=host --cap-add NET_ADMIN --sysctl net.ipv4.tcp_mtu_probing=2
      volumes:
        - /opt/ci-cache/sunmmio:/ci-cache
    env:
      USE_CUDA: 1
      PIP_EXTRA_INDEX_URL: https://download.pytorch.org/whl/cu128
      UV_INDEX: https://download.pytorch.org/whl/cu128
      CMAKE_ARGS: "-DTILELANG_UPDATE_SUBMODULES=OFF"
      XDG_CACHE_HOME: /ci-cache
      PIP_CACHE_DIR: /ci-cache/pip
      UV_CACHE_DIR: /ci-cache/uv
      PRE_COMMIT_HOME: /ci-cache/pre-commit
      GTEST_CACHE_DIR: /ci-cache/googletest
      NPUIR_CACHE_ROOT: /ci-cache/npuir
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          set-safe-directory: true

      - name: Prepare persistent cache
        run: |
          mkdir -p "${PIP_CACHE_DIR}" "${UV_CACHE_DIR}" "${PRE_COMMIT_HOME}" "${GTEST_CACHE_DIR}" "${NPUIR_CACHE_ROOT}"
          echo "Cache mount: /ci-cache"
          du -sh /ci-cache/* 2>/dev/null || echo "Cache is empty (first run)"

      - name: Install system dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            python3.12 python3.12-venv python3.12-dev python3-pip wget \
            cmake ninja-build git curl ca-certificates \
            build-essential pkg-config libprotobuf-dev \
            protobuf-compiler libgflags-dev libsqlite3-dev llvm-dev \
            iproute2 iptables curl dnsutils openssh-client
          ln -sf /usr/bin/python3.12 /usr/local/bin/python

      - name: Set up uv
        run: |
          python -m pip install -U pip
          python -m pip install uv

      - name: Setup Python environment
        run: |
          uv venv .venv --python /usr/bin/python3.12
          uv pip install --python .venv/bin/python -v --upgrade pip setuptools wheel
          uv pip install --python .venv/bin/python -v -r requirements-test.txt
          echo "import torch; print(f'torch: {torch.__version__}')" | uv run --no-project --script -
          uv pip install --python .venv/bin/python --no-build-isolation-package=flash-attn -v -r requirements-test-cuda.txt
          . .venv/bin/activate
          python -c "import torch; print(f'torch: {torch.__version__}'); print(f'cuda available: {torch.cuda.is_available()}'); print(f'device: {torch.cuda.get_device_name(0)}')"
          echo "::group::torch.utils.collect_env"
          uv run --no-project -m -- torch.utils.collect_env
          echo "::endgroup::"

      - name: Install project
        run: |
          uv pip install -v .

      - name: Run single SunMMIO pipeline test
        run: |
          . .venv/bin/activate
          export PYTHONPATH="${GITHUB_WORKSPACE}/maint/scripts:${PYTHONPATH}"
          cd testing
          uv run --no-project -m -- pytest -c pytest.ini -n0 -s -vv --maxfail=1 \
            "./python/transform/test_tilelang_transform_sunmmio_pipeline.py::test_tilelang_transform_sunmmio_pipeline[${{ inputs.case }}]"

      - name: List generated files
        if: ${{ !cancelled() }}
        run: |
          find . -type f -name '*.py[co]' -delete
          find . -depth -type d -name "__pycache__" -exec rm -r "{}" +
          if git status --ignored --porcelain | grep -qvE '/$'; then
            ls -alh $(git status --ignored --porcelain | grep -vE '/$' | grep -oE '\S+$')
          fi

      - name: Prune caches
        if: always()
        run: |
          echo "=== Cache usage before pruning ==="
          du -sh /ci-cache/* 2>/dev/null || true
          uv cache prune 2>/dev/null || true
          echo "=== Cache usage after pruning ==="
          du -sh /ci-cache/* 2>/dev/null || true
